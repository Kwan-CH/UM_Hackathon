<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Rescue - NGO Login</title>
  <link rel="icon" type="image/png" href="../media/food_rescue.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <header class="navbar">
    <a class="logo" href="index.html">
      <img class="logo-mark" src="../media/food_rescue.png" alt="FoodRescue" />
      <span class="logo-text">FoodRescue</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="chatbot.html">Request Pickup</a>
      <a href="benefit.html">Benefits</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
    </nav>
    <a class="btn-outline" href="index.html">Back</a>
  </header>

  <main class="login-page">
    <div class="login-shell">
      <div class="login-header">
        <h1>NGO Login</h1>
        <p>Log in to manage pickups and view incoming requests.</p>
      </div>

      <form class="login-form" action="#" method="post">
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" placeholder="ngo@example.org" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" name="password" placeholder="••••••••" required />
        </label>

        <button class="btn-primary" type="submit">Login</button>

        <div class="login-footer">
          <a href="index.html">Return to Home</a>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
